# fly.toml app configuration file generated for devfocus on 2026-05-07T14:44:20-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'devfocus'
primary_region = 'iad'

[build]

[env]
  DEVFOCUS_DB_PATH = '/data/devfocus.sqlite3'
  DEVFOCUS_PORT = '3001'
  NODE_ENV = 'production'

[[mounts]]
  source = 'devfocus_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
