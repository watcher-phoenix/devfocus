app = "devfocus"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "devfocus_data"
  destination = "/data"

[env]
  NODE_ENV = "production"
  DEVFOCUS_DB_PATH = "/data/devfocus.sqlite3"
  DEVFOCUS_PORT = "3001"
